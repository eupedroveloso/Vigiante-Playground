<div class="projetos">

  <app-context-bar pageTitle="Projetos" (criarProjeto)="goToCriarProjeto()" />

  <!-- Cards grid or empty state -->
  <div class="projetos__content">
    @if (projects().length === 0) {
      <div class="projetos__empty">
        <p class="projetos__empty-text">Nenhum projeto criado ainda.</p>
        <p class="projetos__empty-hint">Clique em "Criar projeto" para começar.</p>
      </div>
    } @else {
      <div class="projetos__grid">
        @for (project of projects(); track project.id) {
          <app-card-project
            [projectId]="project.id"
            [name]="project.name"
            [layerCount]="project.layerCount"
            [locationCount]="project.locationCount"
            [editedAt]="project.editedAt"
            [center]="project.center"
            [zoom]="project.zoom"
            [pins]="project.pins"
            (duplicateProject)="duplicateProject($event)"
            (deleteProject)="deleteProject($event)"
          />
        }
      </div>
    }
  </div>

  <!-- Footer -->
  <footer class="projetos__footer">
    <span class="projetos__footer-text">© 2026 - Vigiante</span>
    <span class="projetos__footer-sep">|</span>
    <span class="projetos__footer-text">Todos os direitos reservados</span>
    <span class="projetos__footer-sep">|</span>
    <span class="projetos__footer-text">Versão 0.0.1</span>
  </footer>

</div>
